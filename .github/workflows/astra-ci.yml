name: Astra CIs
on:
  workflow_dispatch:
  push:
    branches:
      - master
      - develop
  pull_request:
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/*'

permissions: {}

jobs:
  Linter:
    # Don't do this in forks
    if: ${{ github.repository == 'glesur/astra'}}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v3.6.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.x
      - uses: pre-commit/action@646c83fcd040023954eafda54b4db0192ce70507 # v3.0.0
      - uses: pre-commit-ci/lite-action@5d6cc0eb514c891a40562a58a8e71576c5c7fb43 # v1.1.0
        if: always()

  gcc-jobs:
    needs: Linter
    name: CPU Jobs (gcc)
    uses: ./.github/workflows/astra-ci-jobs.yml
    with:
      TEST_OPTIONS: -Werror

  cuda-jobs:
    needs: Linter
    name: CUDA Jobs
    uses: ./.github/workflows/astra-ci-jobs.yml
    with:
      TEST_OPTIONS: -cuda
