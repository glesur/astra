[Grid]
X1-grid    -1    1536  2.0
X2-grid    -0.5  2     0.5
X3-grid    -0.5  2     0.5

[Python]
script    sod_test

[TimeIntegrator]
method    rk3
cfl       0.9
tstop     0.2

[Physics]
rhs          compressible_hydro
viscosity    4e-5                2
eta_rho      4e-5                2
rho_floor    1e-2
cs           1.0

[InitFlow]
python    init_flow  real
