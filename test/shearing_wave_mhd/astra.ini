[Grid]
X1-grid    -0.5  64  0.5
X2-grid    -0.5  32  0.5
X3-grid    -0.5  32  0.5

[Python]
script    shearing_wave_test

[TimeIntegrator]
method    rk3
cfl       0.9
tstop     10.0

[Physics]
rhs            mhd
resistivity    0
viscosity      0
omega          1.0
shear_type     linear
shear_rate     1.5

[InitFlow]
python        init_flow  fourier
mean_field    0.0        0.02     0.05    # Mean magnetic field in each direction

[Output]
log       10
python    0.1  output  fourier
