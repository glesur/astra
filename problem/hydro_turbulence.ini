[Grid]
X1-grid    0.0  64  1.0
X2-grid    0.0  64  1.0
X3-grid    0.0  64  1.0

[Physics]
rhs hydro

[TimeIntegrator]
method  rk3
cfl   0.5
tstop 10.0

[Hydro]
viscosity  0.000001

[InitFlow]
large_scale_3d_noise 1.0  0.1 # Amplitude and cut-off length
#mean_field 0.0 0.0 1.0 # Mean velocity in each direction

[Output]
vtk 0.1
vtk_dir vtk