[Grid]
X1-grid    -1.0  256  1.0
X2-grid    -1.0  256  1.0
X3-grid    -0.5  128  0.5


[TimeIntegrator]
method  rk3
cfl   1.0
tstop 100.0
max_runtime  19.7

[Physics]
rhs mhd
viscosity  1e-4
resistivity 1e-4
omega 1.0
shear_type linear
shear_rate 1.5

[InitFlow]
large_scale_3d_noise 1.0e-2  0.5 # Amplitude and cut-off length
mean_field  0.0 0.0 3.0e-2       # Mean field in each direction (note: beta = 2*omega^2*H^2/b^2, so this corresponds to beta ~ 2222 )

[Output]
vtk 1.0
vtk_dir vtk
vtk_addvar j. # Add the electrical current in the output
vtk_slice1 0.01  0  -0.99  cut # frequently make slices for animations
vtk_slice2 0.01  1  0.99  cut
vtk_slice3 0.01  2  0.49  cut
vtk_slice4 0.01  0  0.0   cut
dump 1.0
timevar_step 0.1
timevar ev vxmax vxmin vymax vymin vzmax vzmin bxmax bxmin eb bymax bymin bzmax bzmin bx.by
